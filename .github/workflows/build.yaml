name: Build and Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      should_release: ${{ steps.check_tag.outputs.should_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags

      - name: Get version from pyproject.toml
        id: get_version
        run: |
          VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git tag | grep -q "^v${{ steps.get_version.outputs.version }}$"; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.get_version.outputs.version }} already exists, skipping release."
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  lint:
    needs: check-version
    uses: ./.github/workflows/ci.yaml

  build-windows:
    needs: [check-version, lint]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Fetch tags
        shell: pwsh
        run: git fetch --tags

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install NSIS (Choco)
        shell: pwsh
        run: |
          choco install nsis
          echo "C:\Program Files (x86)\NSIS\Bin" | Out-File -FilePath "$env:GITHUB_PATH" -Append
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath "$env:GITHUB_PATH" -Append

      - name: Update Path for Windows
        run: echo "$APPDATA\Python\Scripts" >> $GITHUB_PATH

      - name: Enable long paths for git on Windows
        run: git config --system core.longpaths true

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Build with PyInstaller
        run: uv run pyinstaller lightshow.spec

      - name: Zip portable
        shell: pwsh
        run: |
          Compress-Archive -Path dist/lightshow/* `
            -DestinationPath dist/lightshow-portable-win-${{ needs.check-version.outputs.version }}.zip

      - name: Upload portable
        uses: actions/upload-artifact@v7
        with:
          name: windows-portable
          path: dist/lightshow-portable-win-${{ needs.check-version.outputs.version }}.zip

      - name: Create installer
        if: needs.check-version.outputs.should_release == 'true'
        run: |
          cd installer && makensis /DPRODUCT_VERSION=${{ needs.check-version.outputs.version }} lightshow.nsi

      - name: Upload installer # Build and upload the installer only if we are going to release, otherwise it would just be a waste of time and resources
        if: needs.check-version.outputs.should_release == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: installer/lightshow-setup-win-${{ needs.check-version.outputs.version }}.exe

  build-linux:
    needs: [check-version, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 \
            libxcb-render-util0 libxcb-xinerama0 libxcb-xkb1 \
            libxkbcommon-x11-0 upx-ucl fuse

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Build AppImage
        run: uv run pyinstaller lightshow.linux.spec

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool

      - name: Assemble AppDir
        run: |
          mkdir -p AppDir/usr/bin
          cp -r dist/lightshow-linux AppDir/usr/bin/lightshow 
          cp lightshow/gui/assets/lightshow_icon.png AppDir/lightshow.png
          cp installer/lightshow.desktop AppDir/lightshow.desktop
          cp installer/AppRun AppDir/AppRun
          chmod +x AppDir/AppRun

      - name: Build AppImage
        run: |
          ARCH=x86_64 appimagetool AppDir \
            lightshow-${{ needs.check-version.outputs.version }}-x86_64.AppImage

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: linux-appimage
          path: lightshow-${{ needs.check-version.outputs.version }}-x86_64.AppImage

  build-wheel:
    needs: [check-version, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install build dependencies
        run: uv sync --locked --all-extras

      - name: Build wheel
        run: uv build

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheel
          path: dist/*.whl

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz

  release:
    needs: [check-version, build-windows, build-linux, build-wheel]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Download Windows installer artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-installer
          path: win-installer/

      - name: Download Windows portable artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-portable
          path: win-portable/

      - name: Download Linux AppImage artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-appimage
          path: linux-appimage/

      - name: Download wheel artifact
        uses: actions/download-artifact@v8
        with:
          name: wheel
          path: wheel/

      - name: Download sdist artifact
        uses: actions/download-artifact@v8
        with:
          name: sdist
          path: sdist/

      - name: Get previous release tag
        id: prev_release
        shell: pwsh
        run: |
          $tag = gh api repos/${{ github.repository }}/releases --jq ".[0].tag_name" 2>$null
          if (-not $tag) { $tag = "" }
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        shell: pwsh
        run: |
          $format = "- %s (%h) by %an"
          if ("${{ steps.prev_release.outputs.tag }}" -eq "") {
            git log --pretty=format:"$format" | Out-File CHANGELOG.md -Encoding utf8
          } else {
            git log ${{ steps.prev_release.outputs.tag }}..HEAD --pretty=format:"$format" | Out-File CHANGELOG.md -Encoding utf8
          }

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          files: |
            win-installer/*.exe
            win-portable/*.zip
            linux-appimage/*.AppImage
            wheel/*.whl
            sdist/*.tar.gz
          body_path: CHANGELOG.md
