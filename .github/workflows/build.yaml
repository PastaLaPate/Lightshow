name: Build and Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      should_release: ${{ steps.check_tag.outputs.should_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags

      - name: Get version from pyproject.toml
        id: get_version
        run: |
          VERSION=$(grep -m1 '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git tag | grep -q "^v${{ steps.get_version.outputs.version }}$"; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.get_version.outputs.version }} already exists, skipping release."
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

  lint:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    uses: ./.github/workflows/ci.yaml

  build:
    needs: [check-version, lint]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch tags
        shell: pwsh
        run: git fetch --tags

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install NSIS (Choco)
        shell: pwsh
        run: |
          choco install nsis
          echo "C:\Program Files (x86)\NSIS\Bin" | Out-File -FilePath "$env:GITHUB_PATH" -Append
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath "$env:GITHUB_PATH" -Append

      - name: Update Path for Windows
        run: echo "$APPDATA\Python\Scripts" >> $GITHUB_PATH

      - name: Enable long paths for git on Windows
        run: git config --system core.longpaths true

      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Build with PyInstaller
        run: uv run pyinstaller lightshow.spec

      - name: Create installer
        run: |
          cd installer && makensis /DPRODUCT_VERSION=${{ needs.check-version.outputs.version }} lightshow.nsi

      - name: Get previous release tag
        id: prev_release
        shell: pwsh
        run: |
          $tag = gh api repos/${{ github.repository }}/releases --jq ".[0].tag_name" 2>$null
          if (-not $tag) { $tag = "" }
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        shell: pwsh
        run: |
          $format = "- %s (%h) by %an"
          if ("${{ steps.prev_release.outputs.tag }}" -eq "") {
            git log --pretty=format:"$format" | Out-File CHANGELOG.md -Encoding utf8
          } else {
            git log ${{ steps.prev_release.outputs.tag }}..HEAD --pretty=format:"$format" | Out-File CHANGELOG.md -Encoding utf8
          }

      - name: Create Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          files: installer/lightshow-setup-win-${{ needs.check-version.outputs.version }}.exe
          body_path: CHANGELOG.md